mode: daemonset

image:
  repository: otel/opentelemetry-collector-contrib

config:
  receivers:
    otlp:
      protocols:
        grpc: {}
        http: {}

    hostmetrics:
      collection_interval: 10s
      scrapers:
        cpu: {}
        memory: {}
        disk: {}
        filesystem: {}
        network: {}

  processors:
    memory_limiter:
      check_interval: 1s
      limit_mib: 256
    batch: {}

  exporters:
    otlp:
      endpoint: otel-gateway-opentelemetry-collector:4317
      tls:
        insecure: true

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [otlphttp]

      metrics:
        receivers: [otlp, hostmetrics]
        processors: [memory_limiter, batch]
        exporters: [otlphttp]

      logs:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [otlphttp]
